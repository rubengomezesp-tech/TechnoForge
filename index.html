<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechnoForge — Generador de ideas de techno</title>
  <link rel="stylesheet" href="src/styles.css" />
  <!-- Tone.js: motor de audio (síntesis y secuenciador) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◼</span>
      <h1>TechnoForge</h1>
      <span class="tag">tu productor de techno en el navegador</span>
    </div>
    <canvas id="spectrum" class="spectrum" width="200" height="34" title="Analizador de espectro"></canvas>
    <div class="transport">
      <button id="playBtn" class="primary">▶ Play</button>
      <button id="genBtn">🎲 Generar idea</button>
      <button id="modeBtn">🔁 Bucle</button>
      <button id="midiBtn">⬇ MIDI</button>
      <button id="wavBtn">⬇ WAV</button>
      <button id="stemsBtn">⬇ Stems</button>
    </div>
  </header>

  <section class="projectbar">
    <span class="pb-label">Proyecto</span>
    <input id="projName" type="text" value="Mi track" maxlength="60" />
    <button id="saveBtn">💾 Guardar</button>
    <button id="loadBtn">📂 Cargar</button>
    <button id="newBtn">✨ Nuevo</button>
    <input id="loadInput" type="file" accept=".tfp,application/json" hidden />
    <input id="sampleInput" type="file" accept="audio/*" hidden />
    <span class="pb-hint">se autoguarda en este navegador</span>
  </section>

  <section class="controls">
    <label>Preset
      <select id="preset" title="Sonido completo de un estilo (mezcla + síntesis + FX)">
        <option value="">— elige —</option>
        <option value="hard">Hard Techno</option>
        <option value="melodic">Melódico</option>
        <option value="hypnotic">Hipnótico</option>
        <option value="industrial">Industrial</option>
      </select>
    </label>
    <label>BPM
      <input id="bpm" type="range" min="118" max="140" value="128" />
      <output id="bpmOut">128</output>
    </label>
    <label>Tonalidad
      <select id="root">
        <option value="9">A</option>
        <option value="11">B</option>
        <option value="0">C</option>
        <option value="2">D</option>
        <option value="4">E</option>
        <option value="5">F</option>
        <option value="7">G</option>
      </select>
    </label>
    <label>Emoción
      <select id="emotion">
        <option value="melancolia">Melancolía</option>
        <option value="esperanza">Esperanza</option>
        <option value="epica">Épica</option>
        <option value="oscuridad">Oscuridad</option>
        <option value="nostalgia">Nostalgia</option>
        <option value="grandeza">Grandeza</option>
        <option value="tension">Tensión</option>
        <option value="liberacion">Liberación</option>
      </select>
    </label>
    <label>Escala
      <select id="scale">
        <option value="minor">Menor (oscuro)</option>
        <option value="phrygian">Frigia (muy oscuro)</option>
        <option value="dorian">Dórica (groovy)</option>
        <option value="ionian">Mayor (luminosa)</option>
        <option value="lydian">Lidia (asombro)</option>
      </select>
    </label>
    <label>Estilo
      <select id="style">
        <option value="peaktime">Peak-time</option>
        <option value="hypnotic">Hipnótico</option>
        <option value="melodic">Melódico</option>
        <option value="industrial">Industrial</option>
      </select>
    </label>
    <label>Energía
      <input id="energy" type="range" min="0" max="100" value="55" />
      <output id="energyOut">55</output>
    </label>
    <label class="swing">Swing
      <input id="swing" type="range" min="0" max="60" value="12" />
      <output id="swingOut">12</output>
    </label>
    <label>Rumble
      <input id="rumble" type="range" min="0" max="100" value="0" title="Sub-bajo del techno oscuro (desde el kick)" />
      <output id="rumbleOut">0</output>
    </label>
    <label>Humanizar
      <input id="humanize" type="range" min="0" max="100" value="0" title="Micro-desfases aleatorios: imperfección humana" />
      <output id="humanizeOut">0</output>
    </label>
  </section>

  <section id="timeline" class="timeline"><!-- estructura del track (modo Track) --></section>

  <h2 class="zone-title">Secuenciador</h2>
  <section id="tramos" class="tramos"><!-- chips de tramos por JS --></section>
  <div id="editmode" class="editmode">
    <span class="em-label">Editar</span>
    <button type="button" class="seg active" data-mode="notes">Notas</button>
    <button type="button" class="seg" data-mode="prob">Prob</button>
    <button type="button" class="seg" data-mode="ratchet">Ratchet</button>
  </div>
  <main id="grid" class="grid"><!-- las pistas se dibujan por JS --></main>

  <h2 class="zone-title" data-collapsible data-open="false">Instrumentos</h2>
  <section id="instruments" class="instruments"><!-- sintes editables por JS --></section>

  <h2 class="zone-title" data-collapsible data-open="true">Mezclador</h2>
  <section id="mixer" class="mixer"><!-- channel strips por JS --></section>

  <footer class="statusbar">
    <span id="status">Listo. Pulsa <b>Generar idea</b> y luego <b>Play</b>.</span>
  </footer>

  <script src="src/midi.js"></script>
  <script src="src/zip.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
